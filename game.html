<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ZyronVault Game</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="game-page light-mode">

  <nav class="navbar">
    <a class="logo" href="index.html">ZyronVault</a>

    <div class="nav-center">
      <div class="game-dropdown" id="gameDropdown">
        <button class="game-dropdown-btn" onclick="toggleGameDropdown()">
          <span class="selected-game-icon" id="selectedGameIcon">🌐</span>
          <span id="selectedGameName">All Games</span>
          <span class="dropdown-arrow">⌄</span>
        </button>

        <div class="game-menu" id="gameMenu"></div>
      </div>

      <a href="#shop">Shop</a>
      <a href="index.html#how-it-works">How It Works</a>
      <a href="index.html#support">Support</a>
    </div>

    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()">☀️ Light</button>

      <button class="cart-btn" onclick="openCart()">
        Cart <span id="cartCount">0</span>
      </button>
    </div>
  </nav>

  <section class="game-hero">
    <div class="hero-trust-pill">
      <span id="gameHeroIcon">🎮</span>
      <span id="gameHeroTag">Fast delivery</span>
    </div>

    <h1 class="hero-title" id="gameTitle">Game Items</h1>

    <p class="hero-subtitle" id="gameSubtitle">
      Browse items for your favorite game.
    </p>
  </section>

  <main class="container">
    <section class="shop-panel" id="shop">
      <div class="section-title best-seller-title">
        <h2 id="shopTitle">Best Sellers</h2>
        <p id="shopSubtitle">Items are grouped by category.</p>
      </div>

      <div class="game-category-stack" id="itemsGrid"></div>
    </section>
  </main>

  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="close-btn" onclick="closeCart()">Close</button>
    </div>

    <div id="cartItems"></div>

    <div class="cart-total">
      <span>Total</span>
      <span id="cartTotal">$0.00</span>
    </div>

    <button class="checkout-btn" onclick="checkout()">Checkout</button>
  </aside>

  <footer class="footer">
    © 2026 ZyronVault. All rights reserved.
  </footer>

  <script src="items.js"></script>
  <script src="theme.js"></script>

  <script>
    const games = [
      {
        name: "All Games",
        icon: "🌐",
        description: "View everything",
        tag: "All",
        page: "index.html#shop"
      },
      {
        name: "Blox Fruits",
        icon: "🍎",
        description: "Gamepasses, perm fruits & physical fruits",
        tag: "Fast",
        page: "game.html?game=Blox%20Fruits"
      },
      {
        name: "Steal a Brainrot",
        icon: "🧠",
        description: "Brainrots only",
        tag: "Fast",
        page: "game.html?game=Steal%20a%20Brainrot"
      },
      {
        name: "Grow a Garden",
        icon: "🌱",
        description: "Seeds & pets",
        tag: "Fast",
        page: "game.html?game=Grow%20a%20Garden"
      },
      {
        name: "RIVALS",
        icon: "🎯",
        description: "Gamepasses & skin cases",
        tag: "Fast",
        page: "game.html?game=RIVALS"
      }
    ];

    const params = new URLSearchParams(window.location.search);
    const currentGame = params.get("game") || "Blox Fruits";

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const gameDropdown = document.getElementById("gameDropdown");
    const gameMenu = document.getElementById("gameMenu");

    const selectedGameIcon = document.getElementById("selectedGameIcon");
    const selectedGameName = document.getElementById("selectedGameName");

    const gameHeroIcon = document.getElementById("gameHeroIcon");
    const gameHeroTag = document.getElementById("gameHeroTag");
    const gameTitle = document.getElementById("gameTitle");
    const gameSubtitle = document.getElementById("gameSubtitle");

    const shopTitle = document.getElementById("shopTitle");
    const shopSubtitle = document.getElementById("shopSubtitle");

    const itemsGrid = document.getElementById("itemsGrid");

    const cartDrawer = document.getElementById("cartDrawer");
    const cartItems = document.getElementById("cartItems");
    const cartTotal = document.getElementById("cartTotal");
    const cartCount = document.getElementById("cartCount");

    function loadItems() {
      if (typeof getItems === "function") {
        return getItems();
      }

      return [];
    }

    function getCurrentGameInfo() {
      return games.find(game => game.name === currentGame) || games[1];
    }

    function renderGameMenu() {
      gameMenu.innerHTML = "";

      games.forEach(game => {
        const item = document.createElement("div");
        item.className = "game-menu-item";

        item.innerHTML = `
          <span class="game-menu-icon">${game.icon}</span>

          <div>
            <h4>${game.name}</h4>
            <p>${game.description}</p>
          </div>

          <span class="quick-tag">${game.tag}</span>
        `;

        item.addEventListener("click", () => {
          window.location.href = game.page;
        });

        gameMenu.appendChild(item);
      });
    }

    function toggleGameDropdown() {
      gameDropdown.classList.toggle("open");
      gameMenu.classList.toggle("active");
    }

    function closeGameDropdown() {
      gameDropdown.classList.remove("open");
      gameMenu.classList.remove("active");
    }

    function setGameHeader() {
      const game = getCurrentGameInfo();

      document.title = `${currentGame} - ZyronVault`;

      selectedGameIcon.textContent = game.icon;
      selectedGameName.textContent = game.name;

      gameHeroIcon.textContent = game.icon;
      gameHeroTag.textContent = game.description;

      gameTitle.innerHTML = `${game.icon} <span>${currentGame}</span>`;
      gameSubtitle.innerHTML = `Shop ${game.description.toLowerCase()} with fast delivery.`;

      shopTitle.textContent = `${currentGame} Items`;
      shopSubtitle.textContent = `Browse ${currentGame} items by category.`;
    }

    function getCategoryOrder(gameName) {
      const categoryOrders = {
        "Blox Fruits": [
          "Best Sellers",
          "Physical Fruits",
          "Perm Fruits",
          "Gamepasses"
        ],

        "Grow a Garden": [
          "Best Sellers",
          "Seeds",
          "Pets"
        ],

        "RIVALS": [
          "Best Sellers",
          "Gamepasses",
          "Skin Cases"
        ],

        "Steal a Brainrot": [
          "Best Sellers",
          "Brainrots"
        ]
      };

      return categoryOrders[gameName] || ["Best Sellers"];
    }

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/permanent/g, "perm")
        .replace(/perm fruit/g, "perm fruits")
        .replace(/physical fruit/g, "physical fruits")
        .replace(/skin case/g, "skin cases")
        .replace(/gamepass/g, "gamepasses")
        .trim();
    }

    function getSectionItems(items, sectionName) {
      if (sectionName === "Best Sellers") {
        return items.slice(0, 10);
      }

      return items.filter(item => {
        return normalizeText(item.category) === normalizeText(sectionName);
      });
    }

    function getSectionEmoji(sectionName) {
      const emojis = {
        "Best Sellers": "🔥",
        "Physical Fruits": "🍎",
        "Perm Fruits": "👑",
        "Gamepasses": "🎫",
        "Brainrots": "🧠",
        "Seeds": "🌱",
        "Pets": "🐾",
        "Skin Cases": "🎯"
      };

      return emojis[sectionName] || "✨";
    }

    function getSectionClass(sectionName) {
      return "section-category-" + sectionName.toLowerCase().replace(/\s+/g, "-");
    }

    function setupCarouselButtons(section) {
      const track = section.querySelector(".game-carousel-track");
      const prevBtn = section.querySelector(".carousel-arrow.prev");
      const nextBtn = section.querySelector(".carousel-arrow.next");

      if (!track || !prevBtn || !nextBtn) return;

      prevBtn.addEventListener("click", () => {
        track.scrollBy({
          left: -360,
          behavior: "smooth"
        });
      });

      nextBtn.addEventListener("click", () => {
        track.scrollBy({
          left: 360,
          behavior: "smooth"
        });
      });
    }

    function renderGameItems() {
      const allItems = loadItems();

      const gameItems = allItems.filter(item => {
        return item.game === currentGame;
      });

      itemsGrid.innerHTML = "";

      if (gameItems.length === 0) {
        itemsGrid.innerHTML = `
          <div class="empty-state">
            <h3>No items found ;-;</h3>
            <p>No products have been added for ${currentGame} yet.</p>
          </div>
        `;
        return;
      }

      const categoryOrder = getCategoryOrder(currentGame);

      categoryOrder.forEach(sectionName => {
        const sectionItems = getSectionItems(gameItems, sectionName);

        if (sectionItems.length === 0) {
          return;
        }

        const section = document.createElement("section");

        const extraClass = sectionName === "Best Sellers"
          ? "section-best-sellers"
          : getSectionClass(sectionName);

        section.className = `game-carousel-section ${extraClass}`;

        section.innerHTML = `
          <div class="game-carousel-head">
            <h2>${getSectionEmoji(sectionName)} ${sectionName}</h2>

            <div class="game-carousel-nav">
              <button class="carousel-arrow prev" type="button">&#8249;</button>
              <button class="carousel-arrow next" type="button">&#8250;</button>
            </div>
          </div>

          <div class="game-carousel-track-wrap">
            <div class="game-carousel-track"></div>
          </div>
        `;

        const track = section.querySelector(".game-carousel-track");

        renderCards(sectionItems, track);

        itemsGrid.appendChild(section);

        setupCarouselButtons(section);
      });
    }

    function renderCards(items, grid) {
      grid.innerHTML = "";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "item-card";

        const stock = Number(item.stock || 0);
        const price = Number(item.price || 0);

        const imageHTML = item.image
          ? `<img src="${item.image}" alt="${item.name}" onerror="this.parentElement.innerHTML='<div class=&quot;placeholder-img&quot;>🎮</div>'">`
          : `<div class="placeholder-img">🎮</div>`;

        card.innerHTML = `
          <div class="item-img-wrap">
            ${imageHTML}
          </div>

          <span class="item-tag">${item.category || "Item"}</span>

          <h3>${item.name || "Unnamed Item"}</h3>

          <p class="item-meta">
            ${item.game || "Game"}<br>
            ${stock > 0 ? "Stock: " + stock : "Out of stock"}
          </p>

          <div class="item-bottom">
            <span class="price">$${price.toFixed(2)}</span>
            <button class="add-btn" ${stock > 0 ? "" : "disabled"}>Add</button>
          </div>
        `;

        card.querySelector(".add-btn").addEventListener("click", () => {
          addToCart(item.id);
        });

        grid.appendChild(card);
      });
    }

    function addToCart(id) {
      const item = loadItems().find(product => String(product.id) === String(id));

      if (!item) {
        alert("Item not found.");
        return;
      }

      cart.push(item);
      saveCart();
      updateCart();
      openCart();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      saveCart();
      updateCart();
    }

    function saveCart() {
      localStorage.setItem("cart", JSON.stringify(cart));
    }

    function updateCart() {
      cartItems.innerHTML = "";

      let total = 0;

      if (cart.length === 0) {
        cartItems.innerHTML = `<p style="color:var(--muted);">Your cart is empty.</p>`;
      }

      cart.forEach((item, index) => {
        const price = Number(item.price || 0);
        total += price;

        const cartItem = document.createElement("div");
        cartItem.className = "cart-item";

        cartItem.innerHTML = `
          <div>
            <strong>${item.name}</strong>
            <p>${item.game} • ${item.category}</p>
            <p>$${price.toFixed(2)}</p>
          </div>

          <button class="close-btn" onclick="removeFromCart(${index})">X</button>
        `;

        cartItems.appendChild(cartItem);
      });

      cartTotal.textContent = "$" + total.toFixed(2);
      cartCount.textContent = cart.length;
    }

    function openCart() {
      cartDrawer.classList.add("active");
    }

    function closeCart() {
      cartDrawer.classList.remove("active");
    }

    function checkout() {
      if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
      }

      window.location.href = "checkout.html";
    }

    document.addEventListener("click", event => {
      if (!gameDropdown.contains(event.target)) {
        closeGameDropdown();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeGameDropdown();
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      setGameHeader();
      renderGameMenu();
      renderGameItems();
      updateCart();
    });
  </script>

</body>
</html>
